<div class="flex flex-col max-h-[92vh] bg-white rounded-2xl overflow-hidden" dir="ltr">
  
  <!-- Header: Title and Close button -->
  <div class="flex items-center justify-between px-6 py-4 bg-slate-50 border-b border-slate-100">
    <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
      <span class="w-2.5 h-6 bg-indigo-600 rounded-full"></span>
      {{ isEditMode() ? 'Update Employee Details' : 'Add New Employee' }}
      <!-- {{ data.isEdit ? 'Update Employee Details' : 'Add New Employee' }} -->
    </h2>
    <button (click)="onCancel()" class="text-slate-400 hover:text-slate-600 hover:bg-slate-100 p-1.5 rounded-lg transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Content (Scrollable Form Fields) -->
  <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()" class="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar">
    
    <!-- Full Name -->
    <div class="space-y-1.5">
      <label class="text-sm font-semibold text-slate-700">Full Name</label>
      <input 
        type="text" 
        formControlName="name"
        placeholder="e.g. John Doe" 
        class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-slate-800 placeholder-slate-400"
      />
    </div>

    <!-- Contact No & Email Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="space-y-1.5">
        <label class="text-sm font-semibold text-slate-700">Contact No.</label>
        <input 
          type="tel" 
          formControlName="contactNo"
          placeholder="+1 (555) 000-0000" 
          class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all placeholder-slate-400"
        />
      </div>

      <div class="space-y-1.5">
        <label class="text-sm font-semibold text-slate-700">Email Address</label>
        <input 
          type="email" 
          formControlName="email"
          placeholder="name@company.com" 
          class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all placeholder-slate-400"
        />
        @if (isFieldInvalid('email')) {
        <p class="text-xs text-rose-500 font-medium">
          Please enter a valid email.
        </p>
      }
      </div>
    </div>

    <!-- Password Field (Only shown/required if creating a NEW employee) *ngIf="!data.isEdit" -->
    <div  class="space-y-1.5">
      @if (!isEditMode()) {
  <div class="space-y-1.5">
    <label class="text-sm font-semibold text-slate-700">Password</label>
    <input 
      type="password" 
      formControlName="password"
      placeholder="••••••••" 
      class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all placeholder-slate-400"
    />
    @if (isFieldInvalid('password')) {
      <p class="text-xs text-rose-500 font-medium">
        Please enter a valid password (at least 6 characters).
      </p>
    }
  </div>
}
    </div>

    <!-- Department & Role Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <!-- Department DDL -->
      <div class="space-y-1.5">
        <label class="text-sm font-semibold text-slate-700">Department</label>
        <div class="relative">
          <select 
            formControlName="department"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-slate-700 bg-white appearance-none cursor-pointer"
          >
          <option [ngValue]="null" disabled>-- Select Department --</option>
            @for (dept of departments; track dept.childDeptId) {
          <option [value]="dept.childDeptId">
            {{ dept.departmentName }}
          </option>
        }
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7" />
            </svg>
          </div>
        </div>
      </div>

      <!-- Role DDL -->
      <div class="space-y-1.5">
        <label class="text-sm font-semibold text-slate-700">Role</label>
        <div class="relative">
          <select 
            formControlName="role"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-slate-700 bg-white appearance-none cursor-pointer"
          >
            <option value="" disabled selected>Select Role...</option>
            <option value="Admin">Admin</option>
            <option value="Manager">Manager</option>
            <option value="Employee">Employee</option>
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7" />
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Gender DDL -->
    <div class="space-y-1.5">
      <label class="text-sm font-semibold text-slate-700">Gender</label>
      <div class="relative">
        <select 
          formControlName="gender"
          class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-slate-700 bg-white appearance-none cursor-pointer"
        >
          <option value="" disabled selected>Select Gender...</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7" />
          </svg>
        </div>
      </div>
    </div>

  </form>

  <!-- Footer Action Buttons -->
  <div class="flex items-center justify-end gap-3 px-6 py-4 bg-slate-50 border-t border-slate-100">
    <button 
      (click)="onCancel()" 
      class="px-5 py-2.5 rounded-xl border border-slate-200 text-slate-600 hover:bg-slate-100 font-semibold text-sm transition-all"
    >
      Cancel
    </button>
    <!-- [disabled]="employeeForm.invalid" -->
    <button 
      (click)="onSubmit()" 
      [disabled]="employeeForm.invalid || isLoading()"
      class="px-6 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-semibold text-sm transition-all shadow-md shadow-indigo-100 hover:shadow-indigo-200"
    >
      <!-- {{ data.isEdit ? 'Update Employee' : 'Create Employee' }} -->
                   @if (isLoading()) {
        <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        
    } @else {
        {{ isEditMode() ? 'Update Employee' : 'Create Employee' }}
    }
        
    </button>
  </div>

</div>
