<div class="flex min-h-screen">
        
        <!-- Left Side: Image, Logo & Portal Info (Hidden on Mobile) -->
        <div class="hidden lg:flex lg:w-1/2 relative items-center justify-center p-12 overflow-hidden bg-slate-900">
            <!-- Background Image with Dark Overlay for Text Readability -->
            <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1200&q=80" 
                 alt="Office Workspace" 
                 class="absolute inset-0 w-full h-full object-cover opacity-40">
            <div class="absolute inset-0 bg-gradient-to-b from-indigo-950/60 to-slate-950/80"></div>
            
            <!-- Branding Content -->
            <div class="relative z-10 max-w-md w-full">
                <!-- Logo -->
                <div class="flex items-center gap-3 mb-8">
                    <span class="p-2.5 bg-indigo-600 rounded-xl text-white shadow-lg shadow-indigo-500/30">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                        </svg>
                    </span>
                    <span class="text-2xl font-bold tracking-tight text-white">Talent<span class="text-indigo-400">Hub</span></span>
                </div>

                <!-- HR Portal Header Text -->
                <h1 class="text-4xl font-extrabold text-white tracking-tight leading-tight mb-4">
                    HR Management Portal
                </h1>
                <p class="text-lg text-slate-300">
                    Welcome to your central workforce dashboard. Access corporate tools, schedules, and employee insights securely.
                </p>
            </div>
        </div>

        <!-- Right Side: Pure White Canvas with Structural Blueprint/Grid Lines Design -->
        <div class="w-full lg:w-1/2 flex flex-col justify-center px-6 py-12 sm:px-16 lg:px-24 bg-white shadow-2xl z-10 relative overflow-hidden">
            
            <!-- Structural Line Overlay Design over White Background -->
            <div class="absolute inset-0 z-0 pointer-events-none select-none">
                <svg class="absolute inset-0 w-full h-full" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <!-- Perfect 45px grid matrix -->
                        <pattern id="white-canvas-grid" width="45" height="45" patternUnits="userSpaceOnUse">
                            <path d="M 45 0 L 0 0 0 45" fill="none" stroke="#f1f5f9" stroke-width="1"/>
                        </pattern>
                    </defs>
                    <!-- Fills the background layout with clean lines while staying 100% white -->
                    <rect width="100%" height="100%" fill="url(#white-canvas-grid)" />
                    
                    <!-- Clean geometric accent intersecting border line indicators -->
                    <g stroke="#e2e8f0" stroke-width="1.2" fill="none">
                        <line x1="10%" y1="0" x2="10%" y2="100%" stroke-dasharray="4 4" />
                        <line x1="0" y1="85%" x2="100%" y2="85%" />
                        <circle cx="10%" cy="85%" r="6" fill="white" stroke="#cbd5e1" stroke-width="2" />
                    </g>
                </svg>
            </div>

            <!-- Form Body Content Wrapper (Kept z-10 to stay strictly readable above the background design lines) -->
            <div class="mx-auto w-full max-w-md relative z-10">
                
                <!-- Mobile Logo Header -->
                <div class="flex items-center gap-2 mb-8 lg:hidden">
                    <span class="p-2 bg-indigo-600 rounded-lg text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                        </svg>
                    </span>
                    <span class="text-xl font-bold tracking-tight text-slate-900">TalentHub HR</span>
                </div>

                <!-- Form Header -->
                <h2 class="text-3xl font-bold tracking-tight text-slate-900">Sign In</h2>
                <p class="mt-2 text-sm text-slate-500">Please enter your credentials to access your portal account.</p>

                <!-- Login Form action="#" method="POST"-->
                <form  class="mt-8 space-y-6" #loginForm="ngForm" (ngSubmit)="onLogin()">
                    
                    <!-- Username Field -->
                    <div>
                        <label for="username" class="block text-sm font-semibold text-slate-700">Username</label>
                        <div class="mt-1.5">
                            <input [(ngModel)]="LoginObj.userName" id="username" name="userName" type="text" autocomplete="username" required placeholder="e.g., wessam.mustafa" 
                                class="block w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 placeholder-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none sm:text-sm shadow-sm transition-all">
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div>
                        <label for="password" class="block text-sm font-semibold text-slate-700">Password</label>
                        <div class="mt-1.5">
                            <input  [(ngModel)]="LoginObj.password"  id="password" name="password" type="password" autocomplete="current-password" required placeholder="••••••••" 
                                class="block w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 placeholder-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none sm:text-sm shadow-sm transition-all">
                        </div>
                    </div>

                    <!-- Submit Login Button -->
                    <div class="pt-2">
                        <button  type="submit" [disabled]="loginForm.invalid || isLoading()" 
                            class="flex w-full justify-center items-center gap-2 rounded-xl bg-indigo-600 px-4 py-3.5 text-sm font-semibold text-white shadow-lg shadow-indigo-600/20 hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 transition-all transform active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
                            @if (isLoading()) {
        <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        
    } @else {
        <span>Login</span>
    }
                        </button>
                    </div>
                </form>

                <!-- Secure Footer Notice -->
                <p class="mt-8 text-center text-xs text-slate-400">
                    &copy; 2026 TalentHub Inc. Secure HR Access Portal.
                </p>
            </div>
        </div>

    </div>
